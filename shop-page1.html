<style>
.wig-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
  padding: 15px;
}

.wig-card {
  background: rgba(0,0,0,0.6);
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  position: relative;
}

.wig-card img {
  width: 100%;
  border-radius: 10px;
}

/* SOLD OUT BADGE */
.sold-out {
  position: absolute;
  top: 10px;
  left: 10px;
  background: red;
  color: white;
  padding: 6px 12px;
  font-weight: bold;
  border-radius: 6px;
  z-index: 2;
}

/* SOLD OUT EFFECT */
.sold .main-wig-img {
  opacity: 0.5;
}

.sold input,
.sold button {
  background: grey !important;
  cursor: not-allowed;
}
</style>
