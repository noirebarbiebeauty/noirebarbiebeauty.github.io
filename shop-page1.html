<style>
/* WIG GALLERY GRID */
.wig-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
  padding: 15px;
  background: rgba(0,0,0,0.7);
  border-radius: 12px;
}

/* WIG CARD STYLING */
.wig-card {
  background: rgba(0,0,0,0.6);
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  position: relative;
  box-shadow: 0 4px 12px rgba(255,105,180,0.3);
  transition: transform 0.3s ease;
}

.wig-card:hover {
  transform: scale(1.03);
}

.wig-card img {
  width: 100%;
  border-radius: 10px;
  object-fit: cover;
  aspect-ratio: 3/4;
}

/* SOLD OUT BADGE */
.sold-out {
  position: absolute;
  top: 10px;
  left: 10px;
  background: red;
  color: white;
  padding: 6px 12px;
  font-weight: bold;
  border-radius: 6px;
  z-index: 2;
}

.sold .main-wig-img {
  opacity: 0.5;
}

.sold input,
.sold button,
.sold .whatsapp-btn {
  background: grey !important;
  cursor: not-allowed;
}

.wig-card h4 {
  margin-top: 10px;
  font-size: 1.1rem;
  color: #ffccf9;
}

.wig-card .price {
  color: #ffd700;
  font-weight: bold;
  margin: 5px 0;
}

.wig-card input[type="number"] {
  width: 60px;
  padding: 4px 6px;
  border-radius: 6px;
  border: none;
  margin-top: 5px;
}

.wig-card button, .wig-card a.whatsapp-btn {
  margin-top: 8px;
  padding: 6px 12px;
  border-radius: 20px;
  border: none;
  font-weight: bold;
  color: white;
  background: #ff66b2;
  cursor: pointer;
  transition: 0.3s ease;
  display: inline-block;
  text-decoration: none;
}

.wig-card button:hover, .wig-card a.whatsapp-btn:hover {
  background: #e60073;
}

.thumb-gallery {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-top: 5px;
}

.thumb-gallery img {
  width: 40px;
  height: 50px;
  object-fit: cover;
  border-radius: 6px;
  cursor: pointer;
}

/* RESPONSIVE GRID */
@media (max-width: 600px) {
  .wig-gallery {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    padding: 10px;
  }
}
</style>
